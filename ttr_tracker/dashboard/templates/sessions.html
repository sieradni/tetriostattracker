<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions — Tetrio Stats Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: #e0e0e0; min-height: 100vh; }
        nav { background: #1a1a22; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; border-bottom: 1px solid #2a2a35; }
        nav a { color: #a0a0b0; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.3rem 0; border-bottom: 2px solid transparent; }
        nav a:hover, nav a.active { color: #fff; border-bottom-color: #6c5ce7; }
        nav .brand { color: #fff; font-weight: 700; font-size: 1.05rem; margin-right: auto; letter-spacing: 0.3px; }
        nav select { background: #2a2a35; color: #e0e0e0; border: 1px solid #3a3a45; border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem; cursor: pointer; outline: none; }
        nav select:hover { border-color: #6c5ce7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #1a1a22; border: 1px solid #2a2a35; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.6rem 0.5rem; color: #888; font-weight: 600; border-bottom: 1px solid #2a2a35; }
        td { padding: 0.5rem; border-bottom: 1px solid #222; }
        tr:hover td { background: #22222c; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Tetrio Tracker</span>
        <a href="/">Overview</a>
        <a href="/trends">Trends</a>
        <a href="/pbs">PBs</a>
        <a href="/sessions" class="active">Sessions</a>
        <a href="/replays">Replays</a>
        <a href="/matches">Matches</a>
        <select id="gmSelect"></select>
    </nav>
    <div class="container">
        <h1 style="margin-bottom:1rem;font-size:1.3rem;">Sessions</h1>
        <div class="card" style="padding:0;">
            <table>
                <thead>
                    <tr id="sess-headers"></tr>
                </thead>
                <tbody id="session-table"></tbody>
            </table>
        </div>
    </div>

<script>
function fmt(secs) { const m = Math.floor(secs / 60); const s = (secs % 60).toFixed(1); return m > 0 ? `${m}m${s}s` : `${s}s`; }

async function initGM() {
    const sel = document.getElementById('gmSelect');
    const modes = await fetch('/api/gamemodes').then(r => r.json());
    const current = localStorage.getItem('tetrio_gm') || modes[0] || 'blitz';
    sel.innerHTML = modes.map(g => `<option value="${g}"${g===current?' selected':''}>${g === '40l' ? '40L' : g.charAt(0).toUpperCase()+g.slice(1)}</option>`).join('');
    sel.addEventListener('change', function() { localStorage.setItem('tetrio_gm', this.value); location.reload(); });
}
function gm() { return localStorage.getItem('tetrio_gm') || 'blitz'; }

(async function() {
    await initGM();
    const gamemode = gm();
    const r = await fetch(`/api/sessions?gamemode=${gamemode}`);
    const sessions = await r.json();
    const thead = document.getElementById('sess-headers');
    const tbody = document.getElementById('session-table');

    const is40l = gamemode === '40l';
    thead.innerHTML = is40l
        ? '<th>Date</th><th>Duration</th><th>Games</th><th>Avg Time</th><th>Best Time</th>'
        : '<th>Date</th><th>Duration</th><th>Games</th><th>Avg Score</th><th>Best Score</th>';

    tbody.innerHTML = sessions.map(s => {
        if (is40l) {
            return `<tr>
                <td>${new Date(s.start).toLocaleDateString()} ${new Date(s.start).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
                <td>${s.duration_min}</td>
                <td>${s.count}</td>
                <td style="font-weight:700;color:#00b894">${fmt(s.avg_time)}</td>
                <td style="font-weight:700;color:#00b894">${fmt(s.best_time)}</td>
            </tr>`;
        } else {
            return `<tr>
                <td>${new Date(s.start).toLocaleDateString()} ${new Date(s.start).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
                <td>${s.duration_min}</td>
                <td>${s.count}</td>
                <td>${s.avg_score.toLocaleString()}</td>
                <td style="font-weight:700;color:#6c5ce7">${s.best_score.toLocaleString()}</td>
            </tr>`;
        }
    }).join('');
    if (sessions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:2rem;">No sessions yet.</td></tr>';
    }
})();
</script>
</body>
</html>
