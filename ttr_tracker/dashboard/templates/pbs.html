<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBs — Tetrio Stats Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: #e0e0e0; min-height: 100vh; }
        nav { background: #1a1a22; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; border-bottom: 1px solid #2a2a35; }
        nav a { color: #a0a0b0; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.3rem 0; border-bottom: 2px solid transparent; }
        nav a:hover, nav a.active { color: #fff; border-bottom-color: #6c5ce7; }
        nav .brand { color: #fff; font-weight: 700; font-size: 1.05rem; margin-right: auto; letter-spacing: 0.3px; }
        nav select { background: #2a2a35; color: #e0e0e0; border: 1px solid #3a3a45; border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem; cursor: pointer; outline: none; }
        nav select:hover { border-color: #6c5ce7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #1a1a22; border: 1px solid #2a2a35; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c5ce7; margin-bottom: 0.5rem; }
        .pb-highlight { color: #6c5ce7; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: #888; }
        .grid { display: grid; gap: 1rem; }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Tetrio Tracker</span>
        <a href="/">Overview</a>
        <a href="/trends">Trends</a>
        <a href="/pbs" class="active">PBs</a>
        <a href="/sessions">Sessions</a>
        <a href="/replays">Replays</a>
        <a href="/matches">Matches</a>
        <select id="gmSelect"></select>
    </nav>
    <div class="container">
        <h1 style="margin-bottom:1rem;font-size:1.3rem;">Personal Bests</h1>
        <div class="grid grid-3" id="pb-cards"></div>
    </div>

<script>
function fmt(secs) { const m = Math.floor(secs / 60); const s = (secs % 60).toFixed(2); return m > 0 ? `${m}:${s.padStart(5,'0')}` : `${s}s`; }

async function initGM() {
    const sel = document.getElementById('gmSelect');
    const modes = await fetch('/api/gamemodes').then(r => r.json());
    const current = localStorage.getItem('tetrio_gm') || modes[0] || 'blitz';
    sel.innerHTML = modes.map(g => `<option value="${g}"${g===current?' selected':''}>${g === '40l' ? '40L' : g.charAt(0).toUpperCase()+g.slice(1)}</option>`).join('');
    sel.addEventListener('change', function() { localStorage.setItem('tetrio_gm', this.value); location.reload(); });
}
function gm() { return localStorage.getItem('tetrio_gm') || 'blitz'; }

const LABELS = {
    score: 'Score', lines: 'Lines', apm: 'APM', pps: 'PPS', level: 'Level',
    top_combo: 'Top Combo', top_btb: 'Top BTB', tspins: 'T-Spins',
    quads: 'Quads', all_clears: 'All Clears', finesse_perfect_pieces: 'Perfect Pieces',
    kpp: 'KPP', kps: 'KPS', final_time: 'Best Time',
};

(async function() {
    await initGM();
    const gamemode = gm();
    const r = await fetch(`/api/summary?gamemode=${gamemode}`);
    const s = await r.json();
    const container = document.getElementById('pb-cards');

    if (!s.pbs || Object.keys(s.pbs).length === 0) {
        container.innerHTML = '<div class="card"><p>No data yet.</p></div>';
        return;
    }

    const blitzKeys = ['score', 'lines', 'apm', 'pps', 'level', 'top_combo', 'top_btb', 'tspins', 'quads', 'all_clears', 'finesse_perfect_pieces', 'kpp', 'kps'];
    const sprintKeys = ['final_time', 'pps', 'kps', 'kpp', 'score', 'tspins', 'all_clears', 'finesse_perfect_pieces'];
    const keys = gamemode === '40l' ? sprintKeys : blitzKeys;

    container.innerHTML = keys.map(key => {
        if (!s.pbs[key]) return '';
        const [value, id, ts] = s.pbs[key];
        const display = key === 'final_time' ? fmt(value / 1000) : Number(value).toLocaleString(undefined, {maximumFractionDigits:2});
        return `
            <div class="card">
                <h2>${LABELS[key] || key}</h2>
                <div class="pb-highlight" style="font-size:1.5rem;font-weight:700">${display}</div>
                <div class="stat-label">${new Date(ts).toLocaleDateString()}</div>
            </div>
        `;
    }).join('');
})();
</script>
</body>
</html>
