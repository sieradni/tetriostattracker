<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends — Tetrio Stats Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: #e0e0e0; min-height: 100vh; }
        nav { background: #1a1a22; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; border-bottom: 1px solid #2a2a35; }
        nav a { color: #a0a0b0; text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.3rem 0; border-bottom: 2px solid transparent; }
        nav a:hover, nav a.active { color: #fff; border-bottom-color: #6c5ce7; }
        nav .brand { color: #fff; font-weight: 700; font-size: 1.05rem; margin-right: auto; letter-spacing: 0.3px; }
        nav select { background: #2a2a35; color: #e0e0e0; border: 1px solid #3a3a45; border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem; cursor: pointer; outline: none; }
        nav select:hover { border-color: #6c5ce7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #1a1a22; border: 1px solid #2a2a35; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c5ce7; margin-bottom: 0.5rem; }
        .grid-2 { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
        canvas { width: 100% !important; max-height: 300px; }
        .chart-container { position: relative; width: 100%; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Tetrio Tracker</span>
        <a href="/">Overview</a>
        <a href="/trends" class="active">Trends</a>
        <a href="/pbs">PBs</a>
        <a href="/blitz">Blitz Stats</a>
        <a href="/sessions">Sessions</a>
        <a href="/replays">Replays</a>
        <a href="/matches">Matches</a>
        <select id="gmSelect"></select>
    </nav>
    <div class="container">
        <h1 style="margin-bottom:1rem;font-size:1.3rem;">Trends</h1>
        <div class="grid-2" id="chart-grid"></div>
    </div>

<script>
const COLORS = { score: '#6c5ce7', time: '#00b894', apm: '#00b894', pps: '#fdcb6e', lines: '#e17055', level: '#74b9ff', tspins: '#fd79a8', finesse_faults: '#d63031', kpp: '#00cec9', kps: '#e84393', quads: '#e17055', all_clears: '#00b894', score_per_piece: '#fdcb6e' };
const LABELS = { score: 'Score', time: 'Time (s)', apm: 'APM', pps: 'PPS', lines: 'Lines', level: 'Level', tspins: 'T-Spins', finesse_faults: 'Finesse Faults', kpp: 'KPP', kps: 'KPS', quads: 'Quads', all_clears: 'All Clears', score_per_piece: 'S/P' };

async function initGM() {
    const sel = document.getElementById('gmSelect');
    const modes = await fetch('/api/gamemodes').then(r => r.json());
    const current = localStorage.getItem('tetrio_gm') || modes[0] || 'blitz';
    sel.innerHTML = modes.map(g => `<option value="${g}"${g===current?' selected':''}>${g === '40l' ? '40L' : g.charAt(0).toUpperCase()+g.slice(1)}</option>`).join('');
    sel.addEventListener('change', function() { localStorage.setItem('tetrio_gm', this.value); location.reload(); });
}
function gm() { return localStorage.getItem('tetrio_gm') || 'blitz'; }

(async function() {
    await initGM();
    const gamemode = gm();
    const r = await fetch(`/api/trends?gamemode=${gamemode}`);
    const t = await r.json();
    const grid = document.getElementById('chart-grid');

    const blitzKeys = ['score', 'apm', 'pps', 'lines', 'level', 'tspins', 'finesse_faults', 'kpp', 'kps', 'quads', 'all_clears', 'score_per_piece'];
    const sprintKeys = ['time', 'pps', 'kps', 'kpp', 'score', 'tspins', 'finesse_faults'];
    const keys = gamemode === '40l' ? sprintKeys : blitzKeys;

    keys.forEach(key => {
        const data = t[key] || [];
        if (data.length < 1) return;
        const labels = data.map(d => new Date(d[0]).toLocaleDateString());
        const values = data.map(d => d[1]);
        const movingAvg = values.map((v, i, a) => {
            const slice = a.slice(Math.max(0, i - 10), i + 1);
            return slice.reduce((s, x) => s + x, 0) / slice.length;
        });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h2>${LABELS[key] || key}</h2><div class="chart-container"><canvas id="ch-${key}"></canvas></div>`;
        grid.appendChild(card);

        const isInverse = key === 'time' && gamemode === '40l';
        new Chart(document.getElementById(`ch-${key}`), {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: key === 'time' ? 'Time (s)' : key, data: values, borderColor: COLORS[key] || '#6c5ce7', backgroundColor: (COLORS[key] || '#6c5ce7') + '22', fill: true, tension: 0.3, pointRadius: 2 },
                    { label: '10-avg', data: movingAvg, borderColor: isInverse ? '#d63031' : '#fff', borderDash: [3,3], pointRadius: 0, borderWidth: 1.5 },
                ],
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: { legend: { labels: { color: '#aaa', boxWidth: 12 } } },
                scales: { x: { ticks: { color: '#888', maxTicksLimit: 8 } }, y: { ticks: { color: '#888' }, reverse: isInverse } },
            },
        });
    });
})();
</script>
</body>
</html>
